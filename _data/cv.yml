    Projects:
      - name: Multi-channel Sensing System Modeling and Crosstalk Decoupling
        summary: >
          Built a unified observation framework for four-axis inertial
          measurement scenarios and analyzed how channel coupling emerges under
          non-ideal symmetry and multi-channel mixing conditions.
        highlights:
          - Studied the joint effects of channel weights, phase bias, and pulse non-idealities through a multi-path phase superposition model.
          - Analyzed AC Stark shifts and cross-crosstalk as sources of system error and pulse fidelity degradation.
          - Explored system-level optimization ideas based on parameter solving and spatial separation.
          - Abstracted the workflow into a transferable pipeline of observation, calibration, and signal decoupling.

      - name: Complex Dynamical System Simulation and Error Mechanism Analysis
        summary: >
          Extended numerical simulation frameworks from simple velocity
          distribution models toward more realistic systems involving spatial
          distribution, magnetic fields, and Zeeman sub-level effects.
        highlights:
          - Built models around Hamiltonian construction, numerical solving, and result validation.
          - Investigated Raman spectral asymmetry, Rabi oscillation behavior, and pulse calibration issues.
          - Turned complicated physical phenomena into parameterized models and sensitivity analysis tasks.
          - Strengthened the ability to transfer physical intuition into computational modeling for sensing and robotics problems.

      - name: Optical-Electro-Mechanical Platform Design and System Debugging
        summary: >
          Participated in the design, integration, and debugging of experimental
          platforms involving optics, thermal control, magnetic fields, and
          instrumentation constraints.
        highlights:
          - Iterated laser frequency stabilization paths and completed AOM, fiber coupling, and saturated absorption spectrum setup.
          - Contributed to the design of insulation shells, heaters, three-axis coils, and thermal control systems.
          - Debugged temperature sensing circuits and control programs with staged heating and PID control.
          - Accumulated hands-on experience in hardware integration, system troubleshooting, and engineering implementation.

    Research Interests:
      - bullet: Precision sensing and intelligent perception
      - bullet: Complex sensing system modeling and calibration
      - bullet: State estimation and multi-channel observation decoupling
      - bullet: Robotics-related system modeling and transferable engineering methods

    Personal Highlights:
